# Fly.io configuration for Surfa MCP Server (Streamable HTTP)
app = "surfa-mcp"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  SURFA_API_URL = "https://surfa-web.vercel.app"
  SURFA_TIMEOUT = "30"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
